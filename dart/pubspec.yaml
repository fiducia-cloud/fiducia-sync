name: fiducia_sync
description: Local-first Postgres and Supabase sync for Flutter with durable SQLite storage.
version: 0.2.0
repository: https://github.com/fiducia-cloud/fiducia-sync

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.3
  supabase_flutter: ^2.16.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.6
