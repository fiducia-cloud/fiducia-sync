# Dependabot config: weekly update PRs for the SDK's npm deps (under /sdk) and the
# GitHub Actions used by CI.
version: 2
updates:
  # The JS/TS SDK (and its lockfile) lives under sdk/.
  - package-ecosystem: npm
    directory: "/sdk"
    schedule:
      interval: weekly
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
