# CI: run the native Rust core tests, then build the node-target wasm from the
# same crate and run the SDK's JS tests against it.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native Rust unit tests for the transport-agnostic sync-core.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features --locked
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  # Build the node-target WASM from the same crate, then run the SDK tests that
  # import ../pkg-node.
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - name: build node-target wasm
        run: wasm-pack build --target nodejs --out-dir pkg-node -- --features wasm
      - name: sdk tests
        working-directory: sdk
        run: |
          npm ci
          node --test tests/*.test.mjs
          npm audit --audit-level=high
