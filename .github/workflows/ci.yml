# CI: run the native Rust core tests, then build the node-target wasm from the
# same crate and run the SDK's JS tests against it.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Native Rust unit tests for the transport-agnostic sync-core.
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: fiducia_sync
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fiducia_sync"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fiducia_sync
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Validate GitHub Actions
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: ./.github/workflows/ci.yml
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --locked --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --all-features --locked
      - run: cmp sql/postgres/001_fiducia_sync.sql crates/postgres/migrations/001_fiducia_sync.sql
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit@0.22.2
      - run: cargo audit

  # Build the node-target WASM from the same crate, then run the SDK tests that
  # import ../pkg-node.
  sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: wasm-pack@0.15.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22.22.1"
      - name: build node-target wasm
        run: wasm-pack build --target nodejs --out-dir pkg-node -- --package fiducia-sync-core --features wasm --locked
      - name: sdk tests
        working-directory: sdk
        run: |
          npm ci --ignore-scripts
          npm run typecheck
          node --test tests/*.test.mjs
          npm pack --dry-run
          npm audit --audit-level=high

  # Strongly typed Flutter API plus the durable SQLite implementation and
  # Supabase/client JSON transport adapters.
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Flutter checks
        working-directory: dart
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed lib test
          flutter analyze
          flutter test
